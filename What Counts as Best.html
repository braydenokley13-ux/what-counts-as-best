function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
    } catch (e) {}
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false, children }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{children || label}</button>
  );
}

  TweakText, TweakNumber, TweakColor, TweakButton,
});

function computeScores(weights) {
  const totalWeight = Object.values(weights).reduce((a, b) => a + b, 0) || 1;
  return PLAYERS
    .map((p) => {
      const raw = CRITERIA.reduce(
        (sum, c) => sum + p.ratings[c.key] * (weights[c.key] || 0),
        0
      );
      const normalized = (raw / totalWeight) * 10;
      return { ...p, score: normalized, raw };
    })
    .sort((a, b) => b.score - a.score);
}

<script type="text/babel" data-presets="env,react">
/* ============================================================

 * ============================================================ */

function AnalysisPage({ state, setState, onBack, onNext }) {
  const questions = [
    { key: "highest",   label: "Which player ranked highest most often across your frameworks?",                               sub: "Click player tiles on the right to see the exact counts.", hint: "player" },
    { key: "changed",   label: "Did your original answer change?",                                                             sub: "Your initial pick is shown on the right — compare it to what the data suggests.", hint: "initial" },
    { key: "measurable",label: "Which criteria were easiest to measure?",                                                      sub: "Click a criterion to see its player ratings.", hint: "criterion" },
    { key: "subjective",label: "Which criteria were most subjective?",                                                         sub: "Click a criterion to inspect it — where did the numbers feel like judgment calls?", hint: "criterion" },
    { key: "objective", label: "Did any framework feel fully objective?",                                                      sub: "Click a framework to see its weight profile.", hint: "framework" },
    { key: "reveal",    label: "What did this investigation reveal about rankings?",                                           sub: "Write freely. This is the beginning of your TOK argument." },
  ];

  const answered = questions.filter((q) => (state.analysis[q.key] || "").trim().length > 10).length;
  const canContinue = answered >= 4;
  const [inspect, setInspect] = useState(null);

  const top1Counts = useMemo(() => {
    const counts = {};
    state.frameworks.forEach((fw) => {
      const name = fw.ranking[0].name;
      counts[name] = (counts[name] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]);
  }, [state.frameworks]);

  const playerAppearances = useMemo(() => {
    const data = {};
    PLAYERS.forEach(p => {
      const ranks = state.frameworks.map(fw => fw.ranking.findIndex(r => r.id === p.id) + 1);
      data[p.id] = {
        best: ranks.length ? Math.min(...ranks) : null,
        worst: ranks.length ? Math.max(...ranks) : null,
        avg: ranks.length ? ranks.reduce((a,b)=>a+b,0)/ranks.length : null,
        top1: ranks.filter(r=>r===1).length,
      };
    });
    return data;
  }, [state.frameworks]);

  const insertIntoFocused = (text) => {
    const ta = document.activeElement;
    if (ta && ta.tagName === "TEXTAREA" && ta.dataset.analysisKey) {
      const key = ta.dataset.analysisKey;
      const existing = state.analysis[key] || "";
      const sep = existing && !existing.endsWith(" ") && !existing.endsWith("\n") ? " " : "";
      const next = existing + sep + text;
      setState({ ...state, analysis: { ...state.analysis, [key]: next } });
    }
  };

  return (
    <PageFrame number={6} title="What did you discover?" kicker="Step 06 · Analysis" maxWidth={1280}
      task="Click any tile on the right to inspect the evidence. Click the 'insert' button on a stat to drop it into your current response.">
      <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 48, alignItems: "start" }}>
        <div>
          <p className="serif" style={{ fontSize: 19, lineHeight: 1.5, color: "var(--ink-2)", marginTop: 0 }}>
            Write short responses. Aim for precision over length — one clear
            observation is worth more than a paragraph of hedging.
          </p>

          <div style={{ marginTop: 36 }}>
            {questions.map((q, i) => (
              <Field key={q.key} n={`A${i + 1}`} label={q.label} sub={q.sub}>
                <textarea
                  data-analysis-key={q.key}
                  value={state.analysis[q.key] || ""}
                  onChange={(e) =>
                    setState({ ...state, analysis: { ...state.analysis, [q.key]: e.target.value } })
                  }
                  placeholder="Your response…"
                />
                {q.hint && (
                  <div className="mono" style={{ fontSize: 10, color: "var(--ink-4)", letterSpacing: "0.08em", marginTop: 6, textTransform: "uppercase" }}>
                    Tip → click a {q.hint} tile on the right to inspect evidence
                  </div>
                )}
              </Field>
            ))}
          </div>
        </div>

        <aside>
          <div style={{ position: "sticky", top: 140, display: "flex", flexDirection: "column", gap: 16 }}>

            <InspectCard
              label="Your initial pick"
              onClick={() => setInspect({ kind: "initial" })}
              active={inspect?.kind === "initial"}
            >
              <div className="serif" style={{ fontSize: 22, color: "var(--ink)" }}>
                {state.initialPick || "—"}
              </div>
              <div style={{ fontSize: 12, color: "var(--ink-3)", marginTop: 4 }}>
                Click to review your original reasoning.
              </div>
            </InspectCard>

            <div>
              <div className="eyebrow" style={{ marginBottom: 8, display: "flex", justifyContent: "space-between" }}>
                <span>Players · click to inspect</span>
                <span style={{ color: "var(--ink-4)" }}>{state.frameworks.length} frameworks</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
                {PLAYERS.slice(0, 10).map(p => {
                  const ap = playerAppearances[p.id];
                  const active = inspect?.kind === "player" && inspect.id === p.id;
                  return (
                    <button key={p.id}
                      onClick={() => setInspect({ kind: "player", id: p.id })}
                      style={{
                        textAlign: "left", padding: "10px 12px",
                        border: `1px solid ${active ? "var(--ink)" : "var(--rule)"}`,
                        background: active ? "var(--ink)" : ap.top1 > 0 ? "color-mix(in oklch, var(--accent) 10%, var(--paper))" : "transparent",
                        color: active ? "var(--paper)" : "var(--ink)",
                        cursor: "pointer", fontFamily: "var(--serif)", fontSize: 13,
                        display: "flex", flexDirection: "column", gap: 2,
                        transition: "all 140ms ease",
                      }}>
                      <span>{p.name}</span>
                      <span className="mono" style={{ fontSize: 10, color: active ? "rgba(244,240,232,0.6)" : "var(--ink-3)", letterSpacing: "0.05em" }}>
                        {ap.top1 > 0 ? `#1 × ${ap.top1}` : ap.best ? `best #${ap.best}` : "not ranked"}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>

            <div>
              <div className="eyebrow" style={{ marginBottom: 8 }}>Criteria · click to inspect</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {CRITERIA.map(c => {
                  const active = inspect?.kind === "criterion" && inspect.id === c.key;
                  return (
                    <button key={c.key}
                      onClick={() => setInspect({ kind: "criterion", id: c.key })}
                      style={{
                        padding: "6px 10px", fontSize: 12,
                        border: `1px solid ${active ? "var(--ink)" : "var(--rule)"}`,
                        background: active ? "var(--ink)" : "transparent",
                        color: active ? "var(--paper)" : "var(--ink-2)",
                        cursor: "pointer", fontFamily: "var(--sans)",
                      }}>
                      {c.label}
                    </button>
                  );
                })}
              </div>
            </div>

            <div>
              <div className="eyebrow" style={{ marginBottom: 8 }}>Your frameworks</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {state.frameworks.map((fw, i) => {
                  const active = inspect?.kind === "framework" && inspect.id === fw.id;
                  return (
                    <button key={fw.id}
                      onClick={() => setInspect({ kind: "framework", id: fw.id })}
                      style={{
                        padding: "6px 10px", fontSize: 12,
                        border: `1px solid ${active ? "var(--ink)" : "var(--rule)"}`,
                        background: active ? "var(--ink)" : "transparent",
                        color: active ? "var(--paper)" : "var(--ink-2)",
                        cursor: "pointer", fontFamily: "var(--sans)",
                      }}>
                      <span className="mono" style={{ fontSize: 10, marginRight: 6, color: active ? "rgba(244,240,232,0.55)" : "var(--ink-4)" }}>
                        {String(i + 1).padStart(2, "0")}
                      </span>
                      {fw.label}
                    </button>
                  );
                })}
              </div>
            </div>

            <InspectPanel inspect={inspect} state={state} playerAppearances={playerAppearances} top1Counts={top1Counts} onInsert={insertIntoFocused} />

          </div>
        </aside>
      </div>

      <PageNav
        onBack={onBack}
        onNext={onNext}
        nextDisabled={!canContinue}
        hint={canContinue ? `${answered} of ${questions.length} answered — ready to continue` : `Answer at least 4 questions to continue (${answered} so far)`}
      />
    </PageFrame>
  );
}

function InspectCard({ label, onClick, active, children }) {
  return (
    <button onClick={onClick}
      style={{
        textAlign: "left", width: "100%", padding: 16,
        border: `1px solid ${active ? "var(--ink)" : "var(--rule)"}`,
        background: active ? "color-mix(in oklch, var(--accent) 10%, var(--paper))" : "rgba(234, 228, 214, 0.35)",
        cursor: "pointer",
      }}>
      <div className="eyebrow" style={{ marginBottom: 6 }}>{label}</div>
      {children}
    </button>
  );
}

function InsertButton({ text, onInsert }) {
  return (
    <button onClick={() => onInsert(text)}
      className="mono"
      style={{
        fontSize: 9, padding: "2px 6px", letterSpacing: "0.08em",
        border: "1px solid var(--rule)", background: "transparent",
        color: "var(--ink-3)", cursor: "pointer", textTransform: "uppercase",
        marginLeft: 8,
      }}
      onMouseEnter={e => { e.currentTarget.style.background = "var(--ink)"; e.currentTarget.style.color = "var(--paper)"; }}
      onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--ink-3)"; }}
      title="Insert into focused response">
      ↳ insert
    </button>
  );
}

function InspectPanel({ inspect, state, playerAppearances, top1Counts, onInsert }) {
  if (!inspect) {
    return (
      <div style={{ padding: 20, border: "1px dashed var(--rule)", fontSize: 13, color: "var(--ink-4)", fontStyle: "italic", fontFamily: "var(--serif)", textAlign: "center" }}>
        Click any tile above to reveal evidence.
      </div>
    );
  }

  if (inspect.kind === "initial") {
    return (
      <div style={{ padding: 18, border: "1px solid var(--ink)", background: "#FBF8F1" }}>
        <div className="eyebrow" style={{ marginBottom: 8 }}>Your original reasoning</div>
        <div className="serif" style={{ fontSize: 18, color: "var(--ink)" }}>{state.initialPick || "—"}</div>
        <p className="serif" style={{ fontSize: 14, color: "var(--ink-2)", marginTop: 10, lineHeight: 1.5, fontStyle: "italic" }}>
          "{state.initialReason || "(no reason given)"}"
        </p>
        {state.initialPick && <div style={{ marginTop: 10 }}>
          <InsertButton text={`My initial pick was ${state.initialPick}.`} onInsert={onInsert} />
        </div>}
      </div>
    );
  }

  if (inspect.kind === "player") {
    const p = PLAYERS.find(x => x.id === inspect.id);
    const ap = playerAppearances[p.id];
    return (
      <div style={{ padding: 18, border: "1px solid var(--ink)", background: "#FBF8F1" }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>Player evidence</div>
        <div className="serif" style={{ fontSize: 20, color: "var(--ink)" }}>{p.name}</div>
        <div className="mono" style={{ fontSize: 10, color: "var(--ink-3)", letterSpacing: "0.08em", marginTop: 2 }}>{p.era.toUpperCase()}</div>

        <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 4 }}>
          <InspectStat label="Times #1" value={`${ap.top1} / ${state.frameworks.length}`}
            insert={`${p.name} ranked #1 in ${ap.top1} of ${state.frameworks.length} frameworks.`} onInsert={onInsert} />
          <InspectStat label="Best rank" value={ap.best ? `#${ap.best}` : "—"} />
          <InspectStat label="Worst rank" value={ap.worst ? `#${ap.worst}` : "—"} />
          <InspectStat label="Average" value={ap.avg ? ap.avg.toFixed(1) : "—"} />
        </div>

        <div className="eyebrow" style={{ marginTop: 14, marginBottom: 6 }}>Criterion ratings</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {CRITERIA.map(c => (
            <div key={c.key} style={{ display: "grid", gridTemplateColumns: "100px 1fr 32px", gap: 8, alignItems: "center", fontSize: 11 }}>
              <span style={{ color: "var(--ink-3)" }}>{c.label}</span>
              <div style={{ height: 5, background: "var(--rule-2)", position: "relative" }}>
                <div style={{ position: "absolute", inset: 0, width: `${p.ratings[c.key] * 10}%`, background: "var(--ink)" }} />
              </div>
              <span className="mono" style={{ textAlign: "right", color: "var(--ink-2)" }}>{p.ratings[c.key].toFixed(1)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (inspect.kind === "criterion") {
    const c = CRITERIA.find(x => x.key === inspect.id);
    const sorted = [...PLAYERS].sort((a, b) => b.ratings[c.key] - a.ratings[c.key]);
    return (
      <div style={{ padding: 18, border: "1px solid var(--ink)", background: "#FBF8F1" }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>Criterion</div>
        <div className="serif" style={{ fontSize: 20, color: "var(--ink)" }}>{c.label}</div>
        <div style={{ fontSize: 13, color: "var(--ink-3)", marginTop: 2 }}>{c.blurb}</div>

        <div className="eyebrow" style={{ marginTop: 14, marginBottom: 8 }}>Players ranked on this alone</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {sorted.map((p, i) => (
            <div key={p.id} style={{ display: "grid", gridTemplateColumns: "20px 1fr 1fr 32px", gap: 6, alignItems: "center", fontSize: 12 }}>
              <span className="mono" style={{ color: "var(--ink-4)", fontSize: 10 }}>{String(i + 1).padStart(2, "0")}</span>
              <span className="serif" style={{ color: "var(--ink)" }}>{p.name}</span>
              <div style={{ height: 4, background: "var(--rule-2)", position: "relative" }}>
                <div style={{ position: "absolute", inset: 0, width: `${p.ratings[c.key] * 10}%`, background: i === 0 ? "var(--accent)" : "var(--ink)" }} />
              </div>
              <span className="mono" style={{ textAlign: "right", color: "var(--ink-2)" }}>{p.ratings[c.key].toFixed(1)}</span>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 12 }}>
          <InsertButton text={`On "${c.label}" alone, ${sorted[0].name} leads at ${sorted[0].ratings[c.key].toFixed(1)}.`} onInsert={onInsert} />
        </div>
      </div>
    );
  }

  if (inspect.kind === "framework") {
    const fw = state.frameworks.find(x => x.id === inspect.id);
    if (!fw) return null;
    const maxW = Math.max(...Object.values(fw.weights), 1);
    return (
      <div style={{ padding: 18, border: "1px solid var(--ink)", background: "#FBF8F1" }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>Framework</div>
        <div className="serif" style={{ fontSize: 20, color: "var(--ink)" }}>{fw.label}</div>

        <div className="eyebrow" style={{ marginTop: 14, marginBottom: 6 }}>Weights</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {CRITERIA.map(c => (
            <div key={c.key} style={{ display: "grid", gridTemplateColumns: "100px 1fr 24px", gap: 8, alignItems: "center", fontSize: 11 }}>
              <span style={{ color: "var(--ink-3)" }}>{c.label}</span>
              <div style={{ height: 5, background: "var(--rule-2)", position: "relative" }}>
                <div style={{ position: "absolute", inset: 0, width: `${(fw.weights[c.key] / maxW) * 100}%`, background: "var(--accent)" }} />
              </div>
              <span className="mono" style={{ textAlign: "right", color: "var(--ink-2)" }}>{fw.weights[c.key]}</span>
            </div>
          ))}
        </div>

        <div className="eyebrow" style={{ marginTop: 14, marginBottom: 6 }}>Top 3 under this framework</div>
        {fw.ranking.slice(0, 3).map((r, i) => (
          <div key={r.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0" }}>
            <span><span className="mono" style={{ color: "var(--ink-4)", marginRight: 6 }}>{i+1}</span>{r.name}</span>
            <span className="mono" style={{ color: "var(--ink-3)" }}>{r.score.toFixed(1)}</span>
          </div>
        ))}

        <div style={{ marginTop: 10 }}>
          <InsertButton text={`Under my "${fw.label}", ${fw.ranking[0].name} ranks #1 (${fw.ranking[0].score.toFixed(1)}).`} onInsert={onInsert} />
        </div>
      </div>
    );
  }

  return null;
}

function InspectStat({ label, value, insert, onInsert }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, padding: "4px 0", borderBottom: "1px solid var(--rule-2)" }}>
      <span style={{ color: "var(--ink-3)" }}>{label}</span>
      <div style={{ display: "flex", alignItems: "center" }}>
        <span className="mono" style={{ color: "var(--ink)" }}>{value}</span>
        {insert && <InsertButton text={insert} onInsert={onInsert} />}
      </div>
    </div>
  );
}

Object.assign(window, { AnalysisPage, InspectCard, InsertButton, InspectPanel, InspectStat });
</script>

<script type="text/babel" data-presets="env,react">

  const wordCount = state.finalResponse.trim().split(/\s+/).filter(Boolean).length;
  const ready = wordCount >= 75;

  return (
    <PageFrame number={7} title="To what extent do ranking systems reveal what is best — and to what extent do they create it?" kicker="Step 07 · TOK Connection" task="Write a developed paragraph (75+ words). Reference specific evidence from your frameworks.">
      <div style={{ display: "grid", gridTemplateColumns: "2fr 3fr", gap: 56, alignItems: "start" }}>
        <div>
          <div
            style={{
              borderLeft: "2px solid var(--accent)",
              paddingLeft: 20,
              marginBottom: 32,
            }}

            <p
              className="serif"
              style={{ fontSize: 20, lineHeight: 1.45, color: "var(--ink)", margin: 0, fontStyle: "italic" }}
            >
              Rankings can help organize evidence, but they also depend on choices
              about criteria, measurement, and values.
            </p>
            <p
              className="serif"
              style={{ fontSize: 20, lineHeight: 1.45, color: "var(--ink)", marginTop: 16, fontStyle: "italic" }}
            >
              Different frameworks may lead thoughtful people to different conclusions.
            </p>
          </div>

          <div className="eyebrow" style={{ marginBottom: 10 }}>For your response, consider</div>
          <ul style={{ paddingLeft: 18, fontSize: 14, lineHeight: 1.6, color: "var(--ink-2)", margin: 0 }}>
            <li>What counts as evidence when criteria disagree?</li>
            <li>Is a "most objective" framework possible? Desirable?</li>
            <li>How do rankings shape the thing being ranked?</li>
            <li>Where does knowledge end and judgment begin?</li>
          </ul>

          <div
            style={{
              marginTop: 32,
              padding: 16,
              background: "rgba(244, 240, 232, 0.6)",
              border: "1px solid var(--rule)",
              fontSize: 12.5,
              lineHeight: 1.5,
              color: "var(--ink-3)",
            }}
          >
            <span className="mono" style={{ fontSize: 10, letterSpacing: "0.12em", color: "var(--ink-2)" }}>
              A GOOD RESPONSE
            </span>
            <div style={{ marginTop: 6 }}>
              uses specific evidence from your investigation, acknowledges multiple
              positions, and takes a thoughtful stance without overclaiming.
            </div>
          </div>
        </div>

        <div>
          <Field n="FINAL" label="Your response" sub="Write at least a developed paragraph. Reference what you observed.">
            <textarea
              value={state.finalResponse}
              onChange={(e) => setState({ ...state, finalResponse: e.target.value })}
              placeholder="Ranking systems reveal…"
              style={{ minHeight: 320, fontSize: 18 }}
            />
            <div
              style={{
                marginTop: 6,
                display: "flex",
                justifyContent: "space-between",
                fontFamily: "var(--mono)",
                fontSize: 11,
                color: "var(--ink-4)",
                letterSpacing: "0.06em",
              }}
            >
              <span>{wordCount} words {ready ? "· developed ✓" : "· aim for 75+"}</span>
              <span>{state.finalResponse.length} chars</span>
            </div>
          </Field>

          <div
            style={{
              marginTop: 32,
              padding: 24,
              border: "1px solid var(--ink)",
              background: "#FBF8F1",
              display: "flex",
              gap: 20,
              alignItems: "center",
              justifyContent: "space-between",
            }}
          >
            <div>
              <div className="eyebrow" style={{ marginBottom: 6 }}>Submit</div>
              <div className="serif" style={{ fontSize: 17, color: "var(--ink-2)" }}>
                Ready to hand this in to your teacher?
              </div>
            </div>
            <button onClick={onFinish} className="btn btn-accent" disabled={!ready}>
              Finalize & Print →
            </button>
          </div>
        </div>

      <PageNav
        onBack={onBack}
        onNext={onFinish}
        nextLabel="Finalize"
        nextDisabled={!ready}
        hint={ready ? "Ready to finalize" : `${wordCount} / 75 words`}
      />
    </PageFrame>
  );
}

function SubmissionPage({ state, onBack }) {
  const printRef = useRef(null);

  return (
    <PageFrame number={8} title="Investigation complete." kicker="Submission Summary" maxWidth={900}>
      <p
        className="serif"
        style={{ fontSize: 19, lineHeight: 1.5, color: "var(--ink-2)", marginTop: 0 }}
      >
        A print-ready summary of your responses appears below. Use <em>Print / Export</em>
        in the header to save as PDF or send to your teacher.
      </p>

      <div
        ref={printRef}
        style={{
          marginTop: 40,
          padding: 40,
          border: "1px solid var(--ink)",
          background: "#FBF8F1",

          flexDirection: "column",

        }}
      >
        <div>
          <div className="eyebrow">Student Response</div>

            What Counts as Best?
          </h2>
          <div className="mono" style={{ fontSize: 11, color: "var(--ink-3)", marginTop: 4, letterSpacing: "0.08em" }}>

        <SummaryBlock label="§ 02 Initial Judgment" items={[

        <SummaryBlock

            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

                <div key={fw.id} style={{ borderTop: "1px solid var(--rule)", paddingTop: 10 }}>

                    </span>
                    {fw.label}

        <button onClick={() => window.print()} className="btn btn-accent">Print / Export PDF</button>

function SummaryBlock({ label, items, customBody }) {

        {label}

<script type="text/babel" data-presets="env,react">
/* ============================================================
 * app.jsx — Main App: state, routing, persistence, tweaks
 * ============================================================ */

const STORAGE_KEY = "tok-ranking-investigation-v1";

const DEFAULT_WEIGHTS = Object.fromEntries(CRITERIA.map((c) => [c.key, 5]));

const INITIAL_STATE = {
  page: 0,
  initialPick: "",
  initialReason: "",
  currentWeights: DEFAULT_WEIGHTS,
  frameworks: [],
  analysis: {
    highest: "",
    changed: "",
    measurable: "",
    subjective: "",
    objective: "",
    reveal: "",
  },
  finalResponse: "",
  finalized: false,
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "paper",
  "accent": "ochre",
  "serif": "source",
  "baseSize": 16,
  "density": "regular",
  "texture": true,
  "chartStyle": "bar",
  "showRail": true,
  "showHints": true
}/*EDITMODE-END*/;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return INITIAL_STATE;
    const parsed = JSON.parse(raw);
    return { ...INITIAL_STATE, ...parsed, analysis: { ...INITIAL_STATE.analysis, ...(parsed.analysis || {}) } };
  } catch {
    return INITIAL_STATE;
  }
}

const STEP_STATUS = [
  { label: "Introduction",          requires: (s) => true },
  { label: "Initial Judgment",      requires: (s) => s.initialPick && s.initialReason.trim().length >= 10,
    hint: (s) => (!s.initialPick ? "Pick a player above" : s.initialReason.trim().length < 10 ? "Briefly explain your choice" : "Complete") },
  { label: "Build a Framework",     requires: (s) => Object.values(s.currentWeights).reduce((a,b)=>a+b,0) > 0,
    hint: (s) => "Adjust at least one slider so the framework reflects your view" },
  { label: "Live Results",          requires: (s) => s.frameworks.length >= 1,
    hint: (s) => s.frameworks.length < 1 ? "Save at least one framework" : `${s.frameworks.length} saved` },
  { label: "Test More Frameworks",  requires: (s) => s.frameworks.length >= 3,
    hint: (s) => `${s.frameworks.length} / 3 frameworks saved` },
  { label: "Analysis",              requires: (s) => Object.values(s.analysis).filter(v => v.trim().length > 10).length >= 4,
    hint: (s) => `${Object.values(s.analysis).filter(v => v.trim().length > 10).length} / 6 answered (need 4)` },
  { label: "TOK Connection",        requires: (s) => s.finalResponse.trim().split(/\s+/).filter(Boolean).length >= 75,
    hint: (s) => `${s.finalResponse.trim().split(/\s+/).filter(Boolean).length} / 75 words` },
];

function TopProgress({ state, onJump }) {
  const steps = STEP_STATUS;
  return (
    <div
      className="chrome"
      style={{
        position: "sticky",
        top: 0,
        zIndex: 25,
        background: "color-mix(in oklch, var(--paper) 85%, transparent)",
        backdropFilter: "blur(12px)",
        borderBottom: "1px solid var(--rule)",
      }}
    >
      <div style={{ height: 3, background: "var(--rule-2)", position: "relative" }}>
        <div
          style={{
            position: "absolute",
            inset: 0,
            width: `${(state.page / (steps.length - 1)) * 100}%`,
            background: "var(--accent)",
            transition: "width 300ms cubic-bezier(.2,.7,.2,1)",
          }}
        />
      </div>

      <div
        style={{
          padding: "14px 40px",
          display: "grid",
          gridTemplateColumns: "auto 1fr auto",
          gap: 32,
          alignItems: "center",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 20, height: 20, border: "1.5px solid var(--ink)", position: "relative" }}>
            <div style={{ position: "absolute", inset: 3, background: "var(--accent)" }} />
          </div>
          <div style={{ lineHeight: 1.1 }}>
            <div className="eyebrow" style={{ fontSize: 10 }}>Theory of Knowledge</div>
            <div style={{ fontFamily: "var(--serif)", fontSize: 14, fontWeight: 500 }}>
              What Counts as Best?
            </div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 4, justifyContent: "center", flexWrap: "wrap" }}>
          {steps.map((st, i) => {
            const completed = st.requires(state) && i < state.page;
            const current = i === state.page;
            const locked = i > state.page && !steps.slice(0, i).every((s) => s.requires(state));
            return (
              <button
                key={i}
                onClick={() => !locked && onJump(i)}
                disabled={locked}
                style={{
                  background: current ? "var(--ink)" : "transparent",
                  color: current ? "var(--paper)" : locked ? "var(--ink-4)" : "var(--ink-2)",
                  border: `1px solid ${current ? "var(--ink)" : "var(--rule)"}`,
                  padding: "6px 10px 6px 8px",
                  fontFamily: "var(--sans)",
                  fontSize: 12,
                  display: "flex",
                  alignItems: "center",
                  gap: 6,
                  cursor: locked ? "not-allowed" : "pointer",
                  opacity: locked ? 0.5 : 1,
                  transition: "all 160ms ease",
                }}
                title={locked ? "Complete earlier steps first" : st.label}
              >
                <span
                  className="mono"
                  style={{
                    fontSize: 10,
                    color: current ? "rgba(244,240,232,0.55)" : completed ? "var(--accent-ink)" : "var(--ink-4)",
                    letterSpacing: "0.05em",
                  }}
                >
                  {completed ? "✓" : String(i + 1).padStart(2, "0")}
                </span>
                <span style={{ whiteSpace: "nowrap" }}>{st.label}</span>
              </button>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => window.print()} className="btn btn-ghost" style={{ padding: "6px 12px", fontSize: 11 }}>
            Export
          </button>
        </div>
      </div>

      <div
        style={{
          padding: "10px 40px",
          borderTop: "1px solid var(--rule-2)",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          background: "color-mix(in oklch, var(--paper-2) 40%, transparent)",
          fontSize: 12,
        }}
      >
        <div className="mono" style={{ color: "var(--ink-3)", letterSpacing: "0.08em" }}>
          <span style={{ color: "var(--ink-4)" }}>YOU ARE HERE →</span>
          <span style={{ color: "var(--ink)", marginLeft: 10, fontWeight: 600 }}>
            STEP {state.page + 1} OF {steps.length} · {steps[state.page]?.label.toUpperCase()}
          </span>
        </div>
        {state.page < steps.length - 1 && (
          <div className="mono" style={{ color: "var(--ink-3)", letterSpacing: "0.06em", fontSize: 11 }}>
            <span style={{ color: "var(--ink-4)" }}>NEXT →</span>
            <span style={{ color: "var(--ink)", marginLeft: 8 }}>
              {steps[state.page + 1]?.label}
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

function TweaksUI({ t, setTweak, onReset }) {
  return (
    <TweaksPanel>
      <TweakSection label="Theme" />
      <TweakRadio label="Palette"  value={t.theme}  options={["paper", "ivory", "slate", "night"]} onChange={(v) => setTweak("theme", v)} />
      <TweakRadio label="Accent"   value={t.accent} options={["ochre", "cobalt", "forest", "rose", "plum"]} onChange={(v) => setTweak("accent", v)} />
      <TweakToggle label="Paper texture" value={t.texture} onChange={(v) => setTweak("texture", v)} />

      <TweakSection label="Typography" />
      <TweakRadio  label="Serif"      value={t.serif}    options={["source", "garamond", "playfair"]} onChange={(v) => setTweak("serif", v)} />
      <TweakSlider label="Text size"  value={t.baseSize} min={14} max={20} step={1} unit="px" onChange={(v) => setTweak("baseSize", v)} />
      <TweakRadio  label="Density"    value={t.density}  options={["compact", "regular", "cozy"]} onChange={(v) => setTweak("density", v)} />

      <TweakSection label="Display" />
      <TweakRadio  label="Chart"      value={t.chartStyle} options={["bar", "dot"]}   onChange={(v) => setTweak("chartStyle", v)} />
      <TweakToggle label="Progress rail"    value={t.showRail}  onChange={(v) => setTweak("showRail", v)} />
      <TweakToggle label="Inline hints"     value={t.showHints} onChange={(v) => setTweak("showHints", v)} />

      <TweakSection label="Data" />
      <TweakButton onClick={onReset}>Reset all responses</TweakButton>
    </TweaksPanel>
  );
}

function App() {
  const [state, setState] = useState(loadState);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }, [state]);

  useEffect(() => {
    const b = document.body;
    b.dataset.theme = t.theme;
    b.dataset.accent = t.accent;
    b.dataset.serif = t.serif;
    b.dataset.texture = t.texture ? "on" : "off";
    b.style.setProperty("--base-size", `${t.baseSize}px`);
    const densityScale = t.density === "compact" ? 0.85 : t.density === "cozy" ? 1.15 : 1;
    b.style.setProperty("--density", densityScale);
  }, [t]);

  const setPage = (n) => setState((s) => ({ ...s, page: Math.max(0, Math.min(7, n)) }));
  const next = () => setPage(state.page + 1);
  const back = () => setPage(state.page - 1);

  const reset = () => {
    if (confirm("Reset all responses? This cannot be undone.")) {
      localStorage.removeItem(STORAGE_KEY);
      setState(INITIAL_STATE);
    }
  };

  const finalize = () => setState((s) => ({ ...s, page: 7, finalized: true }));

  return (
    <div data-screen-label={`0${state.page + 1} ${(PAGE_TITLES[state.page] || "Submission")}`}>
      {state.page > 0 && <TopProgress state={state} onJump={setPage} />}

      {state.page > 0 && state.page < 7 && t.showRail && (
        <ProgressRail current={state.page} total={7} />
      )}

      {state.page === 0 && <IntroPage onNext={next} />}
      {state.page === 1 && <InitialJudgmentPage state={state} setState={setState} onBack={back} onNext={next} showHints={t.showHints} />}
      {state.page === 2 && <FrameworkBuilderPage state={state} setState={setState} onBack={back} onNext={next} showHints={t.showHints} />}
      {state.page === 3 && <LiveResultsPage state={state} setState={setState} onBack={back} onNext={next} chartStyle={t.chartStyle} showHints={t.showHints} />}
      {state.page === 4 && <MultipleFrameworksPage state={state} setState={setState} onBack={() => setPage(2)} onNext={next} showHints={t.showHints} />}
      {state.page === 5 && <AnalysisPage state={state} setState={setState} onBack={back} onNext={next} showHints={t.showHints} />}
      {state.page === 6 && <TokPage state={state} setState={setState} onBack={back} onFinish={finalize} showHints={t.showHints} />}
      {state.page === 7 && <SubmissionPage state={state} onBack={() => setPage(6)} />}

      <footer
        className="chrome"
        style={{
          marginTop: 60,
          padding: "28px 40px",
          borderTop: "1px solid var(--rule)",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          fontFamily: "var(--mono)",
          fontSize: 11,
          color: "var(--ink-4)",
          letterSpacing: "0.08em",
        }}
      >
        <span>WHAT COUNTS AS BEST? · THEORY OF KNOWLEDGE</span>
        <span>Responses save automatically</span>
      </footer>

      <TweaksUI t={t} setTweak={setTweak} onReset={reset} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
